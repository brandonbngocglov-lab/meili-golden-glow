<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梅里 · 日照金山</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  background:#0a0a0f;color:#c8ccd4;min-height:100vh;
  font-weight:300;letter-spacing:.02em;
}
.w{max-width:720px;margin:0 auto;padding:20px}

/* Header */
.hd{margin-bottom:32px;position:relative}
.hd::after{content:'';position:absolute;bottom:-12px;left:0;width:40px;height:2px;background:rgba(210,180,100,.2)}
.hd .tag{font-size:11px;color:rgba(210,180,100,.4);letter-spacing:4px;text-transform:uppercase}
.hd .admin{float:right;font-size:11px;color:rgba(255,255,255,.06);cursor:pointer;text-decoration:none;letter-spacing:1px}
.hd .admin:hover{color:rgba(255,255,255,.15)}
.hd h1{font-size:26px;font-weight:300;color:#e8e4dc;margin-top:4px;letter-spacing:6px}
.hd .sub{font-size:12px;color:rgba(255,255,255,.08);margin-top:2px;letter-spacing:3px}

/* Hero */
.hero{text-align:center;padding:24px 0 20px}
.hero .pct{font-size:64px;font-weight:100;color:#e8e4dc;line-height:1;letter-spacing:-2px}
.hero .pct span{font-size:28px;font-weight:300;color:rgba(255,255,255,.15)}
.hero .lbl{font-size:12px;color:rgba(255,255,255,.12);margin-top:4px;letter-spacing:4px}
.hero .status{display:inline-block;margin-top:10px;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:1px}
.hero .status.gold{background:rgba(210,180,100,.08);color:#d2b464;border:1px solid rgba(210,180,100,.06)}
.hero .status.green{background:rgba(81,207,102,.06);color:#51cf66;border:1px solid rgba(81,207,102:.04)}
.hero .status.gray{background:rgba(134,142,150,.04);color:#868e96;border:1px solid rgba(134,142,150:.03)}

/* Data Grid */
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.02);border-radius:8px;overflow:hidden;margin-bottom:24px}
.di{padding:10px 8px;text-align:center;background:#0a0a0f}
.di .v{font-size:15px;font-weight:400;color:#e8e4dc}
.di .l{font-size:10px;color:rgba(255,255,255,.12);margin-top:2px;letter-spacing:1px;text-transform:uppercase}

/* Section Title */
.st{font-size:11px;color:rgba(255,255,255,.08);letter-spacing:4px;margin-bottom:10px;font-weight:400;text-transform:uppercase}

/* Weekly */
.wk{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:28px}
.wi{background:rgba(255,255,255,.01);border-radius:6px;padding:8px 4px;text-align:center;border:1px solid rgba(255,255,255,.02)}
.wi .d{font-size:10px;color:rgba(255,255,255:.08);letter-spacing:1px;margin-bottom:4px}
.wi .ic{font-size:16px;margin-bottom:2px}
.wi .n{font-size:14px;font-weight:500;line-height:1}
.wi .t{font-size:9px;color:rgba(255,255,255:.06);margin-top:3px}

/* Form */
.fm{border-top:1px solid rgba(255,255,255,.02);padding-top:16px;margin-bottom:16px}
.fm h2{font-size:15px;font-weight:400;color:#e8e4dc;letter-spacing:2px;margin-bottom:2px}
.fm .fs{font-size:11px;color:rgba(255,255,255,.08);margin-bottom:12px}
.fm .row{margin-bottom:6px}
.fm input,.fm select,.fm textarea{width:100%;padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:6px;color:#e8e4dc;font-size:13px;font-weight:300;outline:none;font-family:inherit}
.fm input:focus,.fm select:focus,.fm textarea:focus{border-color:rgba(210,180,100,.12)}
.fm select option{background:#0a0a0f;color:#e8e4dc}
.fm textarea{resize:vertical;min-height:50px}
.fm .gr2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.fm .btn{width:100%;padding:8px;border-radius:6px;border:none;background:#d2b464;color:#0a0a0f;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:2px;transition:all .1s;font-family:inherit}
.fm .btn:hover{background:#c8a84c}
.fm .msg{font-size:12px;text-align:center;display:none;margin-top:6px}
.fm .msg.ok{display:block;color:#51cf66}
.fm .msg.er{display:block;color:#ff6b6b}

/* Footer */
.ft{text-align:center;font-size:10px;color:rgba(255,255,255,.03);padding:20px 0;letter-spacing:1px}

/* ===== ADMIN MODAL ===== */
#am{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:100;justify-content:center;align-items:center}
#am.s{display:flex}
#ab{background:#0a0a0f;border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:24px;width:280px;text-align:center}
#ab h2{font-size:16px;font-weight:300;color:#e8e4dc;letter-spacing:4px;margin-bottom:2px}
#ab .sub{font-size:11px;color:rgba(255,255,255,.08);margin-bottom:14px}
#ab input{width:100%;padding:7px 10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:4px;color:#e8e4dc;font-size:13px;font-weight:300;outline:none;margin-bottom:6px;font-family:inherit}
#ab input:focus{border-color:rgba(210,180,100,.1)}
#ab button{width:100%;padding:7px;border-radius:4px;border:none;background:#d2b464;color:#0a0a0f;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:2px}
#ab .er{color:#ff6b6b;font-size:11px;margin-top:3px;display:none}
#ab .cl{font-size:10px;color:rgba(255,255,255,.04);margin-top:6px;cursor:pointer}

/* ===== ADMIN DASHBOARD ===== */
#ad{display:none}
.ad-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ad-h h2{font-size:16px;font-weight:300;color:#e8e4dc;letter-spacing:3px}
.ad-h .ex{font-size:10px;color:rgba(255,255,255,.06);cursor:pointer;letter-spacing:1px}
.ad-h .ex:hover{color:#ff6b6b}
.ad-c{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}
.ad-ci{background:rgba(255,255,255,.005);border:1px solid rgba(255,255,255,.01);border-radius:6px;padding:8px;text-align:center}
.ad-ci .n{font-size:18px;font-weight:300;color:#d2b464}
.ad-ci .n.gr{color:#51cf66}
.ad-ci .l{font-size:9px;color:rgba(255,255,255,.06);margin-top:2px;letter-spacing:1px}
.ad-t{background:rgba(255,255,255,.005);border:1px solid rgba(255,255,255,.01);border-radius:6px;padding:8px}
.ad-t .h{font-size:11px;font-weight:400;color:rgba(255,255,255,.1);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.ad-t .h .csv{font-size:9px;color:rgba(210,180,100,.3);cursor:pointer;letter-spacing:1px}
.ad-t .h .csv:hover{color:rgba(210,180,100,.5)}
.tb{width:100%;border-collapse:collapse;font-size:11px;font-weight:300}
.tb th{padding:4px 6px;text-align:left;color:rgba(255,255,255,.06);font-weight:400;border-bottom:1px solid rgba(255,255,255,.01);letter-spacing:1px}
.tb td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.005)}
.ad-em{text-align:center;padding:16px;color:rgba(255,255,255:.03);font-size:11px}

@media(max-width:640px){
  .w{padding:14px}
  .hero .pct{font-size:48px}
  .dg{grid-template-columns:repeat(2,1fr)}
  .wk{grid-template-columns:repeat(4,1fr)}
  .wk .wi:nth-child(n+5){display:none}
  .fm .gr2{grid-template-columns:1fr}
  .ad-c{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="w">

<!-- Header -->
<div class="hd">
  <span class="tag">✦ Meili</span>
  <a class="admin" onclick="showLogin()">⚙︎ 管理</a>
  <h1>日照金山</h1>
  <div class="sub">M E I L I · S N O W · M O U N T A I N</div>
</div>

<!-- Prediction -->
<div class="hero" id="heroBox">
  <div style="font-size:11px;color:rgba(255,255,255,.06);letter-spacing:2px" id="loadText">装载中</div>
  <div id="heroContent" style="display:none">
    <div class="pct"><span id="pctNum">--</span><span>%</span></div>
    <div class="lbl">今日日照金山概率</div>
    <div class="status" id="statusBadge">--</div>
  </div>
</div>

<!-- Data Grid -->
<div class="dg" id="dataGrid"></div>

<!-- Weekly -->
<div class="st">未来七日</div>
<div class="wk" id="weekGrid"></div>

<!-- Form -->
<div class="fm">
  <h2>预约提醒</h2>
  <div class="fs">提前一天通知最佳观赏时间</div>
  <div class="gr2">
    <input id="inpName" placeholder="称呼">
    <input id="inpContact" placeholder="手机 / 微信">
  </div>
  <div class="gr2">
    <select id="inpDate">
      <option value="">计划日期</option>
      <option>明天</option><option>后天</option><option>这周末</option><option>下周</option>
    </select>
    <textarea id="inpNote" placeholder="备注（选填）" style="margin:0;height:50px"></textarea>
  </div>
  <button class="btn" onclick="subForm()">预约</button>
  <div class="msg" id="fMsg"></div>
</div>

<!-- Footer -->
<div class="ft">梅里雪山 · 卡瓦格博</div>
</div>

<!-- ADMIN LOGIN -->
<div id="am">
  <div id="ab">
    <h2>管理后台</h2>
    <div class="sub">梅里雪山 · 日照金山</div>
    <input type="password" id="pwd" placeholder="密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登录</button>
    <div class="er" id="loginEr">密码错误</div>
    <div class="cl" onclick="closeLogin()">✕</div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="ad">
  <div class="w">
    <div class="ad-h"><h2>管理后台</h2><span class="ex" onclick="logout()">退出</span></div>
    <div class="ad-c">
      <div class="ad-ci"><div class="n" id="s1">-</div><div class="l">总访问</div></div>
      <div class="ad-ci"><div class="n gr" id="s2">-</div><div class="l">今日</div></div>
      <div class="ad-ci"><div class="n" id="s3">-</div><div class="l">咨询</div></div>
      <div class="ad-ci"><div class="n gr" id="s4">-</div><div class="l">留资</div></div>
    </div>
    <div class="ad-t">
      <div class="h"><span>客户咨询</span><span class="csv" onclick="expCSV()">导出 CSV</span></div>
      <div id="adT"></div>
    </div>
  </div>
</div>

<script>
const PWD = 'meili2024';
function gd(){try{return JSON.parse(localStorage.getItem('_md')||'{"v":0,"d":{},"q":[]}')}catch(e){}return{v:0,d:{},q:[]}}
function sd(v){try{localStorage.setItem('_md',JSON.stringify(v))}catch(e){}}

// Track visit
(function(){var d=gd();d.v++;var t=new Date().toISOString().slice(0,10);d.d[t]=(d.d[t]||0)+1;sd(d)})();

// Admin
function showLogin(){document.getElementById('am').classList.add('s')}
function closeLogin(){document.getElementById('am').classList.remove('s')}
function login(){
  if(document.getElementById('pwd').value===PWD){
    closeLogin();document.getElementById('ad').style.display='block';sessionStorage.setItem('_aa','1');rAd()
  }else{
    document.getElementById('loginEr').style.display='block';setTimeout(function(){document.getElementById('loginEr').style.display='none'},1200)
  }
}
(function(){if(sessionStorage.getItem('_aa')==='1'){document.getElementById('ad').style.display='block';rAd()}})();
function logout(){sessionStorage.removeItem('_aa');document.getElementById('ad').style.display='none'}

function rAd(){
  var d=gd();document.getElementById('s1').textContent=d.v;
  document.getElementById('s2').textContent=d.d[new Date().toISOString().slice(0,10)]||0;
  document.getElementById('s3').textContent=d.q.length;document.getElementById('s4').textContent=d.q.length;
  var tb=document.getElementById('adT');
  if(!d.q.length){tb.innerHTML='<div class="ad-em">暂无客户咨询</div>';return}
  var h='<table class="tb"><thead><tr><th>时间</th><th>称呼</th><th>联系</th><th>日期</th><th>备注</th></tr></thead><tbody>';
  for(var i=d.q.length-1;i>=0;i--){var q=d.q[i];h+='<tr><td>'+q.t+'</td><td>'+q.n+'</td><td>'+q.c+'</td><td>'+(q.p||'-')+'</td><td>'+(q.o||'-')+'</td></tr>'}
  h+='</tbody></table>';tb.innerHTML=h;
}

function expCSV(){
  var d=gd(),rows=[["时间","称呼","联系","日期","备注"]];
  for(var i=0;i<d.q.length;i++){var q=d.q[i];rows.push([q.t,q.n,q.c,q.p||'',q.o||''])}
  var csv=rows.map(function(r){return r.map(function(c){return'"'+(c||'').replace(/"/g,'""')+'"'}).join(',')}).join('\n');
  var b=new Blob(['\ufeff'+csv],{type:'text/csv'});var a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='客户_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function subForm(){
  var n=document.getElementById('inpName').value.trim(),c=document.getElementById('inpContact').value.trim(),m=document.getElementById('fMsg');
  if(!n||!c){m.innerHTML='请填写称呼和联系方式';m.className='msg er';return}
  var d=gd();d.q.push({t:new Date().toLocaleString('zh-CN').slice(5,16),n:n,c:c,p:document.getElementById('inpDate').value,o:document.getElementById('inpNote').value.trim()});sd(d);
  m.innerHTML='已收到，我们会提前通知您';m.className='msg ok';
  document.getElementById('inpName').value='';document.getElementById('inpContact').value='';
  document.getElementById('inpDate').value='';document.getElementById('inpNote').value='';
  if(document.getElementById('ad').style.display==='block')rAd();
}

// Weather
var WM={0:'晴',1:'大部晴',2:'多云',3:'阴',45:'雾',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',80:'阵雨',95:'雷暴'};
var WI={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',61:'🌦️',63:'🌧️',65:'🌧️',71:'🌨️',73:'❄️',75:'❄️',80:'🌦️',95:'⛈️'};
(async function(){
  try{
    var p=new URLSearchParams({latitude:28.45,longitude:98.78,current:'temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,cloud_cover,wind_speed_10m',daily:'sunrise,sunset,weather_code,temperature_2m_max,temperature_2m_min',timezone:'Asia/Shanghai',forecast_days:'7'});
    var r=await fetch('https://api.open-meteo.com/v1/forecast?'+p);if(!r.ok)throw Error();
    var w=await r.json();var c=w.current;
    var cc=c.cloud_cover,wc=c.weather_code,hu=c.relative_humidity_2m;
    var sc=Math.round((cc<=10?100:cc<=20?90:cc<=30?70:cc<=50?40:20)*.35+(wc===0?100:wc===1?90:wc===2?55:30)*.25+(hu<=30?100:hu<=50?85:hu<=65?65:40)*.2+20);
    
    document.getElementById('loadText').style.display='none';
    document.getElementById('heroContent').style.display='block';
    document.getElementById('pctNum').textContent=sc;
    var sb=document.getElementById('statusBadge');
    sb.textContent=sc>=80?'🌟极佳':sc>=60?'👍良好':sc>=40?'🤞一般':'😢较低';
    sb.className='status '+(sc>=80?'gold':sc>=60?'green':'gray');
    
    document.getElementById('dataGrid').innerHTML=
      '<div class="di"><div class="v">'+c.temperature_2m.toFixed(0)+'°</div><div class="l">气温</div></div>'+
      '<div class="di"><div class="v">'+(WM[wc]||'晴')+'</div><div class="l">天气</div></div>'+
      '<div class="di"><div class="v">'+cc.toFixed(0)+'%</div><div class="l">云量</div></div>'+
      '<div class="di"><div class="v">'+c.relative_humidity_2m.toFixed(0)+'%</div><div class="l">湿度</div></div>'+
      '<div class="di"><div class="v">'+c.wind_speed_10m.toFixed(1)+'</div><div class="l">风速</div></div>'+
      '<div class="di"><div class="v">'+c.precipitation.toFixed(1)+'mm</div><div class="l">降水</div></div>'+
      '<div class="di"><div class="v">'+w.daily.sunrise[0].slice(11,16)+'</div><div class="l">日出</div></div>'+
      '<div class="di"><div class="v">'+w.daily.sunset[0].slice(11,16)+'</div><div class="l">日落</div></div>';
    
    var wk=document.getElementById('weekGrid');wk.innerHTML='';
    for(var i=0;i<Math.min(7,w.daily.time.length);i++){
      var s2=Math.round((w.daily.weather_code[i]<=1?100:w.daily.weather_code[i]===2?55:30)*.35+25+20);
      var el=document.createElement('div');el.className='wi';
      el.innerHTML='<div class="d">'+(i===0?'今天':i===1?'明天':w.daily.time[i].slice(5))+'</div>'+
        '<div class="ic">'+(WI[w.daily.weather_code[i]]||'☀️')+'</div>'+
        '<div class="n" style="color:'+(s2>=80?'#d2b464':s2>=60?'#51cf66':'#868e96')+'">'+s2+'%</div>'+
        '<div class="t">'+w.daily.temperature_2m_min[i].toFixed(0)+'°/'+w.daily.temperature_2m_max[i].toFixed(0)+'°</div>';
      wk.appendChild(el);
    }
  }catch(e){document.getElementById('loadText').textContent='数据加载失败，请刷新'}
})();
</script>
</body>
</html>
