<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梅里雪山·日照金山预测系统</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:linear-gradient(180deg,#0a0e27 0%,#141b3d 30%,#1a2350 60%,#2a1f3d 100%);
  color:#e0e6f0;min-height:100vh;line-height:1.6;
  background-attachment:fixed;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(212,160,23,.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(212,160,23,.5)}

/* ===== Layout ===== */
.container{max-width:1200px;margin:0 auto;padding:16px 20px 40px}

/* ===== Header ===== */
.header{text-align:center;padding:30px 0 10px;position:relative}
.header::after{content:'🏔️';position:absolute;top:-5px;right:20px;font-size:2rem;opacity:.3}
.header h1{
  font-size:2rem;font-weight:800;
  background:linear-gradient(135deg,#FFD700 0%,#FFA500 40%,#FF6347 70%,#FFD700 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:2px;text-shadow:none;
}
.header .subtitle{font-size:.9rem;color:rgba(255,255,255,.5);margin-top:4px;letter-spacing:4px}
.header .location{font-size:.85rem;color:rgba(255,215,0,.6);margin-top:2px}
.header .update-time{font-size:.75rem;color:rgba(255,255,255,.3);margin-top:6px}

/* ===== Mountain Decoration ===== */
.mountain-divider{
  text-align:center;font-size:1.2rem;letter-spacing:8px;
  color:rgba(255,215,0,.08);margin:4px 0 20px;
  user-select:none;
}

/* ===== Main Card ===== */
.card{
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:24px;
  margin-bottom:16px;transition:all .3s;
}
.card:hover{border-color:rgba(255,215,0,.15);box-shadow:0 8px 32px rgba(0,0,0,.3)}

/* ===== Prediction Hero ===== */
.prediction-hero{
  display:flex;flex-wrap:wrap;gap:20px;align-items:center;
  justify-content:center;padding:10px 0;
}
.prediction-ring{position:relative;width:140px;height:140px;flex-shrink:0}
.prediction-ring svg{transform:rotate(-90deg);width:140px;height:140px}
.prediction-ring .bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:6}
.prediction-ring .fg{
  fill:none;stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset 1s ease,stroke .5s;
}
.prediction-ring .center-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
}
.prediction-ring .center-text .value{font-size:2.4rem;font-weight:800;line-height:1}
.prediction-ring .center-text .label{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:2px}
.prediction-info{flex:1;min-width:200px}
.prediction-info .level{
  font-size:1.5rem;font-weight:700;margin-bottom:4px;
}
.prediction-info .desc{font-size:.85rem;color:rgba(255,255,255,.6);line-height:1.7}
.prediction-info .badge{
  display:inline-block;padding:4px 12px;border-radius:20px;
  font-size:.75rem;font-weight:600;margin-top:8px;
}

/* ===== Countdown ===== */
.countdown-bar{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  margin:10px 0 6px;
}
.countdown-item{text-align:center;min-width:56px}
.countdown-item .num{
  font-size:1.6rem;font-weight:700;
  background:rgba(255,215,0,.1);border-radius:8px;
  padding:4px 10px;min-width:44px;display:inline-block;
}
.countdown-item .lbl{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:2px}

/* ===== Status Grid ===== */
.status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}
.status-item{
  background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px;text-align:center;
}
.status-item .icon{font-size:1.3rem}
.status-item .val{font-size:1rem;font-weight:600;margin-top:4px}
.status-item .lbl{font-size:.7rem;color:rgba(255,255,255,.4);margin-top:2px}

/* ===== Section Title ===== */
.section-title{
  font-size:1.1rem;font-weight:700;margin:18px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.section-title .dot{
  width:6px;height:6px;border-radius:50%;background:#FFD700;
  display:inline-block;
}

/* ===== 7-Day Forecast ===== */
.forecast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
.forecast-day{
  background:rgba(255,255,255,.03);border-radius:12px;padding:12px;
  text-align:center;transition:all .2s;
}
.forecast-day:hover{background:rgba(255,255,255,.07);transform:translateY(-2px)}
.forecast-day .date{font-size:.75rem;color:rgba(255,255,255,.5)}
.forecast-day .name{font-size:.85rem;font-weight:600;margin-top:2px}
.forecast-day .weather-icon{font-size:1.6rem;margin:6px 0}
.forecast-day .predict-val{font-size:1.3rem;font-weight:800}
.forecast-day .predict-lbl{font-size:.65rem;margin-top:1px}
.forecast-day .temps{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:4px}

/* ===== Factor Breakdown ===== */
.factor-list{display:grid;grid-template-columns:1fr;gap:8px}
.factor-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.02);border-radius:8px;padding:8px 14px;
}
.factor-icon{font-size:1.2rem;width:32px}
.factor-info{flex:1}
.factor-info .name{font-size:.85rem;font-weight:500}
.factor-info .detail{font-size:.72rem;color:rgba(255,255,255,.45)}
.factor-bar-wrap{width:120px;flex-shrink:0}
.factor-bar-bg{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.factor-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.factor-score{font-size:.85rem;font-weight:600;width:36px;text-align:right;flex-shrink:0}

/* ===== AI Analysis ===== */
.analysis-box{
  background:rgba(255,215,0,.02);border:1px solid rgba(255,215,0,.08);
  border-radius:12px;padding:16px;line-height:1.8;font-size:.88rem;
  min-height:100px;
}
.analysis-box p{margin-bottom:8px}
.analysis-box .highlight{color:#FFD700;font-weight:500}
.analysis-box .bad-warn{color:#ff6b6b}
.analysis-box .good{color:#51cf66}
.analysis-box .mid{color:#ffd43b}
.analysis-box .tag{
  display:inline-block;padding:0 8px;border-radius:4px;
  font-size:.75rem;font-weight:600;
}

/* ===== Hourly Timeline ===== */
.timeline-wrap{overflow-x:auto;padding-bottom:8px}
.timeline{display:flex;gap:6px;min-width:max-content}
.timeline-item{
  text-align:center;padding:8px;border-radius:8px;
  background:rgba(255,255,255,.02);min-width:60px;transition:all .2s;
}
.timeline-item.sunrise-block{
  background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);
}
.timeline-item .h{font-size:.72rem;color:rgba(255,255,255,.5)}
.timeline-item .ic{font-size:1.1rem;margin:4px 0}
.timeline-item .cc{font-size:.7rem;color:rgba(255,255,255,.4)}
.timeline-item .bar{
  width:24px;height:3px;margin:3px auto 0;border-radius:2px;
}

/* ===== Loading / Error ===== */
.loading-spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(255,215,0,.1);border-top-color:#FFD700;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:rgba(255,255,255,.4);font-size:.85rem;margin-left:8px}
.error-msg{color:#ff6b6b;font-size:.85rem;padding:16px;text-align:center}

/* ===== Time Picker Toggle ===== */
.time-toggle{display:flex;gap:8px;justify-content:center;margin:10px 0 16px}
.time-btn{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.5);padding:6px 18px;border-radius:20px;
  cursor:pointer;font-size:.82rem;transition:all .2s;
}
.time-btn.active{background:rgba(255,215,0,.12);border-color:#FFD700;color:#FFD700;font-weight:600}
.time-btn:hover{background:rgba(255,255,255,.08)}

/* ===== Footer ===== */
.footer{text-align:center;font-size:.72rem;color:rgba(255,255,255,.2);padding:30px 0 10px;line-height:1.8}
.footer a{color:rgba(255,215,0,.3);text-decoration:none}
.footer a:hover{color:rgba(255,215,0,.6)}

/* Responsive */
@media(max-width:640px){
  .container{padding:12px 12px 30px}
  .header h1{font-size:1.5rem}
  .prediction-ring{width:110px;height:110px}
  .prediction-ring svg{width:110px;height:110px}
  .prediction-ring .center-text .value{font-size:2rem}
  .prediction-info .level{font-size:1.2rem}
  .status-grid{grid-template-columns:repeat(3,1fr)}
  .forecast-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .factor-bar-wrap{width:70px}
  .countdown-item .num{font-size:1.2rem;padding:3px 8px}
  .card{padding:16px}
}
@media(max-width:400px){
  .status-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <h1>🏔️ 日照金山预测</h1>
    <div class="subtitle">梅里雪山 · 卡瓦格博峰</div>
    <div class="location">📍 飞来寺观景台 · 海拔 3,400m</div>
    <div class="update-time" id="updateTime">加载中…</div>
  </div>

  <div class="mountain-divider">△ △ △ △ △</div>

  <!-- Time Toggle -->
  <div class="time-toggle">
    <button class="time-btn active" data-mode="sunrise" onclick="switchMode('sunrise')">🌅 日出 · 日照金山</button>
    <button class="time-btn" data-mode="sunset" onclick="switchMode('sunset')">🌇 日落 · 晚霞金山</button>
  </div>

  <!-- Prediction Card -->
  <div class="card" id="predictionCard">
    <div class="prediction-hero">
      <div class="prediction-ring">
        <svg viewBox="0 0 140 140">
          <circle class="bg" cx="70" cy="70" r="60"/>
          <circle class="fg" id="predictionCircle" cx="70" cy="70" r="60"
            stroke-dasharray="377" stroke-dashoffset="377" stroke="#666"/>
        </svg>
        <div class="center-text">
          <div class="value" id="predictionValue">--</div>
          <div class="label">概率 %</div>
        </div>
      </div>
      <div class="prediction-info">
        <div class="level" id="predictionLevel">数据加载中…</div>
        <div class="desc" id="predictionDesc"></div>
        <div class="badge" id="predictionBadge" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Countdown -->
  <div class="card" style="padding:14px 20px">
    <div id="countdownDisplay" style="text-align:center;font-size:.88rem;color:rgba(255,255,255,.5)">
      计算下一次日出时间…
    </div>
    <div class="countdown-bar" id="countdownBar"></div>
  </div>

  <!-- Current Weather -->
  <div class="card">
    <div class="section-title"><span class="dot"></span> 当前天气实况</div>
    <div id="currentWeatherGrid" class="status-grid">
      <div class="loading-spinner" style="margin:10px auto"></div>
    </div>
  </div>

  <!-- Hourly Timeline -->
  <div class="card">
    <div class="section-title"><span class="dot"></span> 未来24小时 · 云量变化</div>
    <div class="timeline-wrap">
      <div class="timeline" id="hourlyTimeline"></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:.75rem;color:rgba(255,255,255,.35)">
      <span>🟢 低云量 &lt;20%</span>
      <span>🟡 20-50%</span>
      <span>🔴 &gt;50%</span>
      <span style="margin-left:auto">☀️ 日出/日落时刻高亮</span>
    </div>
  </div>

  <!-- 7-Day Forecast -->
  <div class="card">
    <div class="section-title"><span class="dot"></span> 7日逐日预测</div>
    <div class="forecast-grid" id="forecastGrid">
      <div class="loading-spinner" style="margin:10px auto"></div>
    </div>
  </div>

  <!-- Factor Analysis -->
  <div class="card">
    <div class="section-title"><span class="dot"></span> 核心因子分析</div>
    <div class="factor-list" id="factorList">
      <div style="text-align:center;padding:12px;color:rgba(255,255,255,.3)">分析中…</div>
    </div>
  </div>

  <!-- AI Analysis Report -->
  <div class="card">
    <div class="section-title"><span class="dot"></span> 🤖 AI 分析报告</div>
    <div class="analysis-box" id="analysisReport">
      <div style="display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.4)">
        <span class="loading-spinner"></span> 正在分析气象数据…
      </div>
    </div>
  </div>

  <!-- Season / Context -->
  <div class="card" style="background:rgba(255,215,0,.02);border-color:rgba(255,215,0,.06)">
    <div class="section-title"><span class="dot"></span> 📅 季节背景</div>
    <div id="seasonContext" style="font-size:.85rem;color:rgba(255,255,255,.6);line-height:1.8"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div>数据来源: Open-Meteo 气象模型 (ECMWF / GFS)</div>
    <div>⚠️ 高海拔山区天气变化剧烈，预测仅供参考</div>
    <div style="margin-top:4px">
      最佳观赏季节：10月 - 次年4月 · 飞来寺 / 雾浓顶
    </div>
    <div style="margin-top:6px;opacity:.4">梅里日照·金山预测系统 v1.0</div>
  </div>
</div>

<script>
/* ===================================================================
   🌄 梅里雪山 · 日照金山预测系统
   核心引擎 — 基于多因子加权模型 + 天气实况分析
   =================================================================== */

// ---- 坐标 ----
const LOCATION = { lat: 28.45, lng: 98.78, name: '梅里雪山·飞来寺' };
const API_BASE = 'https://api.open-meteo.com/v1/forecast';

// ---- 当前模式: 'sunrise' | 'sunset' ----
let currentMode = 'sunrise';
let weatherData = null;
let horlyData = null;
let dailyData = null;
let currentData = null;

// ===================================================================
//  WMO 天气码映射
// ===================================================================
const WMO = {
  0:  { desc:'晴天', icon:'☀️', grade:'excellent' },
  1:  { desc:'大部晴', icon:'🌤️', grade:'great' },
  2:  { desc:'多云', icon:'⛅', grade:'fair' },
  3:  { desc:'阴天', icon:'☁️', grade:'poor' },
  45: { desc:'雾', icon:'🌫️', grade:'bad' },
  48: { desc:'雾凇', icon:'🌫️', grade:'bad' },
  51: { desc:'小毛毛雨', icon:'🌦️', grade:'bad' },
  53: { desc:'毛毛雨', icon:'🌦️', grade:'bad' },
  55: { desc:'大毛毛雨', icon:'🌧️', grade:'bad' },
  61: { desc:'小雨', icon:'🌦️', grade:'bad' },
  63: { desc:'中雨', icon:'🌧️', grade:'bad' },
  65: { desc:'大雨', icon:'🌧️', grade:'bad' },
  71: { desc:'小雪', icon:'🌨️', grade:'bad' },
  73: { desc:'中雪', icon:'❄️', grade:'bad' },
  75: { desc:'大雪', icon:'❄️', grade:'bad' },
  80: { desc:'阵雨', icon:'🌦️', grade:'bad' },
  81: { desc:'中阵雨', icon:'🌧️', grade:'bad' },
  82: { desc:'大阵雨', icon:'🌧️', grade:'bad' },
  95: { desc:'雷暴', icon:'⛈️', grade:'bad' },
};

// ===================================================================
//  权重配置（日出模式）
// ===================================================================
const WEIGHTS_SUNRISE = {
  cloudCover:    0.35,   // 日出前后云量
  weatherCode:   0.25,   // 天气状况
  precipitation: 0.20,   // 降水概率
  humidity:      0.10,   // 相对湿度
  seasonFactor:  0.10,   // 季节因素
};
const WEIGHTS_SUNSET = {
  cloudCover:    0.30,
  weatherCode:   0.25,
  precipitation: 0.20,
  humidity:      0.10,
  seasonFactor:  0.15,
};

// ===================================================================
//  主要函数
// ===================================================================

/* ---- 1. 获取气象数据 ---- */
async function fetchWeather() {
  const params = new URLSearchParams({
    latitude:  LOCATION.lat.toString(),
    longitude: LOCATION.lng.toString(),
    current:   'temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,cloud_cover,wind_speed_10m,pressure_msl',
    hourly:    'temperature_2m,relative_humidity_2m,precipitation_probability,precipitation,weather_code,cloud_cover,visibility,wind_speed_10m,wind_direction_10m',
    daily:     'sunrise,sunset,weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant',
    timezone:  'Asia/Shanghai',
    forecast_days: '7',
  });
  const url = `${API_BASE}?${params}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const d = await resp.json();
  weatherData = d;
  currentData = d.current;
  horlyData   = d.hourly;
  dailyData   = d.daily;
}

/* ---- 2. 计算季节因子 (0-100) ---- */
function seasonFactor() {
  const now = new Date();
  const m = now.getMonth() + 1; // 1-12
  // 旱季: 10-4月(最好) ; 5月(过渡) ; 6-9月(雨季)
  if (m >= 10 || m <= 4) return 100;  // 黄金季节
  if (m === 5) return 70;  // 过渡期
  if (m === 6 || m === 9) return 40; // 雨季头尾
  return 20; // 7-8月 雨季最盛
}

/* ---- 3. 计算单日预测 ---- */
function calcDayPrediction(dayIndex, mode) {
  if (!weatherData) return { score: 0, level: '--' };
  const weights = mode === 'sunrise' ? WEIGHTS_SUNRISE : WEIGHTS_SUNSET;

  // 获取日出/日落时间
  const sunriseStr = dailyData.sunrise[dayIndex];
  const sunsetStr  = dailyData.sunset[dayIndex];
  if (!sunriseStr || !sunsetStr) return { score: 0, level: '--' };
  const sunriseDate = new Date(sunriseStr);
  const sunsetDate  = new Date(sunsetStr);

  // 目标时刻: 日出前后30分钟 OR 日落前后30分钟
  let targetHour;
  if (mode === 'sunrise') {
    targetHour = sunriseDate.getHours() + sunriseDate.getMinutes() / 60;
  } else {
    targetHour = sunsetDate.getHours() + sunsetDate.getMinutes() / 60;
  }

  // 找到该小时索引
  const targetIdx = findHourlyIndex(dayIndex, targetHour);
  if (targetIdx < 0) return { score: 0, level: '--' };

  // 提取数据
  const cc    = horlyData.cloud_cover[targetIdx];                // 云量 0-100
  const wcode = horlyData.weather_code[targetIdx];              // 天气码
  const pp    = horlyData.precipitation_probability[targetIdx]; // 降水概率 0-100
  const hum   = horlyData.relative_humidity_2m[targetIdx];      // 湿度 0-100
  const sf    = seasonFactor();

  // --- 云量评分 ---
  const ccScore = cc <= 10 ? 100 : cc <= 20 ? 90 : cc <= 30 ? 70 : cc <= 50 ? 40 : cc <= 70 ? 20 : 5;

  // --- 天气码评分 ---
  const wm = WMO[wcode] || WMO[0];
  let wcScore;
  if (wcode === 0) wcScore = 100;
  else if (wcode === 1) wcScore = 90;
  else if (wcode === 2) wcScore = 55;
  else if ([45,48].includes(wcode)) wcScore = 10;
  else if ([3].includes(wcode)) wcScore = 30;
  else wcScore = 0;

  // --- 降水评分 ---
  const ppScore = pp <= 5 ? 100 : pp <= 10 ? 85 : pp <= 20 ? 65 : pp <= 40 ? 35 : pp <= 60 ? 15 : 0;

  // --- 湿度评分 ---
  const humScore = hum <= 30 ? 100 : hum <= 50 ? 85 : hum <= 65 ? 65 : hum <= 80 ? 40 : 15;

  // --- 加权计算 ---
  const score = Math.round(
    ccScore  * weights.cloudCover +
    wcScore  * weights.weatherCode +
    ppScore  * weights.precipitation +
    humScore * weights.humidity +
    sf       * weights.seasonFactor
  );

  // 硬约束: 如果强降水或恶劣天气，分数直接压低
  const finalScore = Math.max(0, Math.min(100, score));

  // 等级
  let level, levelClass;
  if (finalScore >= 85)       { level = '🌟 极佳'; levelClass = 'excellent'; }
  else if (finalScore >= 70)  { level = '👍 良好'; levelClass = 'good'; }
  else if (finalScore >= 50)  { level = '🤞 一般'; levelClass = 'fair'; }
  else if (finalScore >= 30)  { level = '😕 较低'; levelClass = 'low'; }
  else                        { level = '😢 很低'; levelClass = 'verylow'; }

  return {
    score: finalScore,
    level, levelClass,
    cc, wcode, pp, hum, sf,
    wm, wcScore, ccScore, ppScore, humScore,
    sunriseTime: sunriseStr, sunsetTime: sunsetStr,
    targetHour,
    targetIdx,
    dateStr: sunriseStr.substring(0,10),
  };
}

function findHourlyIndex(dayIndex, hour) {
  // hourly.time 格式: "2026-05-18T00:00"
  const datePrefix = dailyData.time[dayIndex];
  const targetH = Math.floor(hour);
  let bestIdx = -1, bestDiff = Infinity;
  for (let i = 0; i < horlyData.time.length; i++) {
    const t = horlyData.time[i];
    if (t.startsWith(datePrefix)) {
      const h = parseInt(t.substring(11,13), 10);
      const diff = Math.abs(h - targetH);
      if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
    }
  }
  return bestIdx;
}

/* ---- 4. 获取当前目标时刻的索引 ---- */
function getCurrentTargetIdx(mode) {
  if (!dailyData || dailyData.sunrise.length === 0) return -1;
  const now = new Date();
  const todayStr = now.toISOString().substring(0,10);
  let dayIdx = 0;
  for (let i = 0; i < dailyData.time.length; i++) {
    if (dailyData.time[i] === todayStr) { dayIdx = i; break; }
  }
  // 如果当前时间已过目标时刻，看下一天
  const sunriseDate = new Date(dailyData.sunrise[dayIdx]);
  const sunsetDate  = new Date(dailyData.sunset[dayIdx]);
  const target = mode === 'sunrise' ? sunriseDate : sunsetDate;

  if (now > target && dayIdx < dailyData.time.length - 1) dayIdx++;
  return dayIdx;
}

/* ---- 5. 渲染 UI ---- */
function renderAll() {
  if (!weatherData) return;
  const dayIdx = getCurrentTargetIdx(currentMode);
  const pred = calcDayPrediction(dayIdx, currentMode);
  if (!pred) return;

  // --- 主预测环 ---

  // --- 7日预测 ---

  // --- 因子分解 ---

  // --- AI分析 ---
  renderAnalysis(pred, dayIdx);

  // --- 季节背景 ---
  renderSeasonContext();

  // --- 倒计时 ---
  renderCountdown(pred, dayIdx);

  // --- 更新时间 ---
  document.getElementById('updateTime').textContent =
    '⏱ 更新于 ' + new Date().toLocaleString('zh-CN', { hour12: false });
}

/* ---- 预测环 ---- */
function renderPredictionRing(pred) {
  const circle = document.getElementById('predictionCircle');
  const valEl  = document.getElementById('predictionValue');
  const circumference = 377;
  const offset = circumference - (pred.score / 100) * circumference;
  const color = getScoreColor(pred.score);
  circle.setAttribute('stroke', color);
  circle.style.strokeDashoffset = offset;
  valEl.textContent = pred.score;
}

function getScoreColor(s) {
  if (s >= 85) return '#FFD700';
  if (s >= 70) return '#51cf66';
  if (s >= 50) return '#ffd43b';
  if (s >= 30) return '#ff922b';
  return '#ff6b6b';
}

function getScoreEmoji(s) {
  if (s >= 85) return '🌟'; if (s >= 70) return '👍';
  if (s >= 50) return '🤞'; if (s >= 30) return '😕';
  return '😢';
}

function renderPredictionText(pred, dayIdx) {
  const levelEl = document.getElementById('predictionLevel');
  const descEl  = document.getElementById('predictionDesc');
  const badgeEl = document.getElementById('predictionBadge');

  const modeLabel = currentMode === 'sunrise' ? '日出' : '日落';
  const dateStr = formatDateDisplay(pred.dateStr, dayIdx);
  levelEl.textContent = `${pred.level} · ${pred.score}%`;
  levelEl.style.color = getScoreColor(pred.score);

  // 详细描述
  const ccLabel = pred.cc <= 20 ? '晴朗/少云' : pred.cc <= 40 ? '疏云' : pred.cc <= 60 ? '多云' : '阴云密布';
  const wmIcon = pred.wm ? pred.wm.icon : '☀️';
  descEl.innerHTML =
    `${dateStr} ${modeLabel}前后 &nbsp;·&nbsp; 云量 ${pred.cc}% (${ccLabel}) &nbsp;·&nbsp; ${wmIcon} ${pred.wm ? pred.wm.desc : ''}`;

  // 标签
  let badgeText = '', badgeColor = '';
  if (pred.score >= 85) { badgeText = '🎯 极大概率，建议冲！'; badgeColor = 'rgba(255,215,0,.2)'; }
  else if (pred.score >= 70) { badgeText = '✅ 概率较高，值得期待'; badgeColor = 'rgba(81,207,102,.2)'; }
  else if (pred.score >= 50) { badgeText = '⏳ 有机会，关注临近预报'; badgeColor = 'rgba(255,212,59,.15)'; }
  else { badgeText = '⚠️ 条件不佳，建议调整行程'; badgeColor = 'rgba(255,107,107,.15)'; }
  badgeEl.textContent = badgeText;
  badgeEl.style.display = 'inline-block';
  badgeEl.style.background = badgeColor;
  badgeEl.style.color = getScoreColor(pred.score);
}

function formatDateDisplay(dateStr, dayIdx) {
  if (!dateStr) return '';
  const today = new Date().toISOString().substring(0,10);
  if (dateStr === today) return '📅 今天';
  const tomorrow = new Date(Date.now() + 86400000).toISOString().substring(0,10);
  if (dateStr === tomorrow) return '📅 明天';
  const weekDays = ['周日','周一','周二','周三','周四','周五','周六'];
  const d = new Date(dateStr);
  return `${dateStr.substring(5)} ${weekDays[d.getDay()]}`;
}

/* ---- 逐时云量 ---- */
function renderHourlyTimeline(dayIdx) {
  const wrap = document.getElementById('hourlyTimeline');
  if (!horlyData) { wrap.innerHTML = '<div class="error-msg">无数据</div>'; return; }

  const datePrefix = dailyData.time[dayIdx];
  const items = [];
  let sunriseIdx = -1, sunsetIdx = -1;

  // 找到日出日落对应的小时索引
  const sunriseStr = dailyData.sunrise[dayIdx];
  const sunsetStr  = dailyData.sunset[dayIdx];
  const sunriseH = sunriseStr ? parseInt(sunriseStr.substring(11,13),10) : -1;
  const sunsetH  = sunsetStr ? parseInt(sunsetStr.substring(11,13),10) : -1;

  for (let i = 0; i < horlyData.time.length && items.length < 24; i++) {
    const t = horlyData.time[i];
    if (!t.startsWith(datePrefix)) continue;
    const h = parseInt(t.substring(11,13), 10);
    const cc = horlyData.cloud_cover[i];
    const wc = horlyData.weather_code[i];
    const wm = WMO[wc] || WMO[0];
    const isSunrise = h === sunriseH;
    const isSunset  = h === sunsetH;

    if (isSunrise) sunriseIdx = items.length;
    if (isSunset)  sunsetIdx  = items.length;

    items.push({ h, cc, icon: wm.icon, isSunrise, isSunset, i });
  }

  if (items.length === 0) { wrap.innerHTML = '<div class="error-msg">无时序数据</div>'; return; }

  wrap.innerHTML = items.map((it, idx) => {
    const highlight = (currentMode === 'sunrise' && it.isSunrise) || (currentMode === 'sunset' && it.isSunset);
    const barColor = it.cc <= 20 ? '#51cf66' : it.cc <= 50 ? '#ffd43b' : '#ff6b6b';
    const cls = highlight ? 'timeline-item sunrise-block' : 'timeline-item';
    const marker = highlight ? (currentMode === 'sunrise' ? '🌅' : '🌇') : '';
    return `<div class="${cls}">
      <div class="h">${it.h}:00${marker ? '<br>'+marker : ''}</div>
      <div class="ic">${it.icon}</div>
      <div class="cc">${it.cc}%</div>
      <div class="bar" style="background:${barColor};width:${Math.min(30, it.cc * 0.3 + 6)}px"></div>
    </div>`;
  }).join('');
}

  for (let i = 0; i < Math.min(7, dailyData.time.length); i++) {

    const wm = WMO[dailyData.weather_code[i]] || WMO[0];

  el.innerHTML = lines.join('\n');
}

/* ---- 季节背景 ---- */
function renderSeasonContext() {
  const el = document.getElementById('seasonContext');
  const m = new Date().getMonth() + 1;
  let text = '';
  if (m >= 10 || m <= 4) {
    text = `当前是 <span style="color:#FFD700">旱季（10月-次年4月）</span>，也是观赏梅里雪山日照金山的黄金窗口。此时受南支西风控制，天气晴朗稳定，空气干燥，能见度高。<br><br>🏆 最佳月份：11月-1月，成功率可达 70-85%。飞来寺清晨经常万里无云，卡瓦格博峰一览无余。`;
  } else if (m >= 6 && m <= 9) {
    text = `当前是 <span style="color:#ff922b">雨季（6月-9月）</span>，受西南季风影响，水汽充沛，云量较多。日照金山概率处于全年最低水平（约 15-30%）。<br><br>💡 但别灰心！雨过天晴的清晨偶有惊艳——运气好时能看到"云瀑金山"的奇景。凌晨 4-5 点时段云量往往最少。`;
  } else {
    text = `当前是 <span style="color:#ffd43b">过渡期（5月）</span>，旱季向雨季转换。天气系统不稳定，偶有惊喜。清晨通常比下午稳定。<br><br>📊 5月平均可见率约 40-60%，建议出发前 3 天开始密切关注预报。`;
  }
  el.innerHTML = text;
}

/* ---- 倒计时 ---- */
function renderCountdown(pred, dayIdx) {
  const bar = document.getElementById('countdownBar');
  const display = document.getElementById('countdownDisplay');
  if (!pred || !dailyData) { display.textContent = '加载中…'; return; }

  const targetStr = currentMode === 'sunrise' ? dailyData.sunrise[dayIdx] : dailyData.sunset[dayIdx];
  if (!targetStr) { display.textContent = '无法获取目标时间'; return; }

  const target = new Date(targetStr);
  const now = new Date();
  const diff = target - now;
  const modeLabel = currentMode === 'sunrise' ? '🌅 下次日出' : '🌇 下次日落';
  const hh = String(target.getHours()).padStart(2,'0');
  const mm = String(target.getMinutes()).padStart(2,'0');
  const dateLabel = formatDateDisplay(targetStr.substring(0,10), dayIdx);
  display.textContent = `${modeLabel}：${dateLabel} ${hh}:${mm}`;

  if (diff <= 0) {
    bar.innerHTML = '<span style="color:rgba(255,215,0,.5)">已过今日观赏时段，查看明天预测</span>';
    return;
  }

  const hours = Math.floor(diff / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);

  bar.innerHTML = `
    <div class="countdown-item"><div class="num">${String(hours).padStart(2,'0')}</div><div class="lbl">小时</div></div>
    <div class="countdown-item"><div class="num">${String(mins).padStart(2,'0')}</div><div class="lbl">分钟</div></div>
    <div class="countdown-item"><div class="num">${String(secs).padStart(2,'0')}</div><div class="lbl">秒</div></div>
  `;
}

/* ---- 切换日出/日落 ---- */
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  renderAll();
  // 重启 countdown 定时器
  startCountdownTick();
}

/* ---- 倒计时 tick ---- */
let countdownTimer = null;
function startCountdownTick() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    if (weatherData) {
      const dayIdx = getCurrentTargetIdx(currentMode);
      const pred = calcDayPrediction(dayIdx, currentMode);
      renderCountdown(pred, dayIdx);
    }
  }, 1000);
}

/* ===================================================================
   初始化
   =================================================================== */
async function init() {
  try {
    await fetchWeather();
    renderAll();
    startCountdownTick();
    // 每15分钟自动刷新
    setInterval(async () => {
      try {
        await fetchWeather();
        renderAll();
      } catch(e) {
        console.warn('Auto-refresh failed:', e);
      }
    }, 15 * 60 * 1000);
  } catch (e) {
    document.getElementById('updateTime').textContent = '⚠️ 数据获取失败';
    document.getElementById('predictionLevel').textContent = '⚠️ 连接异常';
    document.getElementById('predictionDesc').textContent = '请检查网络后刷新页面';
    console.error(e);
  }
}

init();
</script>
